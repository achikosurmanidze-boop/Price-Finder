<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ფასების შემდარებელი 🇬🇪</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes shimmer { 0%{background-position:-800px 0} 100%{background-position:800px 0} }
    .skeleton { background:linear-gradient(90deg,#e0e0e0 25%,#f0f0f0 50%,#e0e0e0 75%); background-size:800px 100%; animation:shimmer 1.5s infinite; }
    .card-hover { transition:transform .2s,box-shadow .2s; }
    .card-hover:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.12); }
    input:focus,textarea:focus { outline:none; }
    @keyframes slide-in { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
    .slide-in { animation:slide-in .3s ease; }
    @keyframes bounce-in { 0%{transform:scale(.8);opacity:0} 100%{transform:scale(1);opacity:1} }
    .bounce-in { animation:bounce-in .25s ease; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-thumb { background:#ccc; border-radius:3px; }

    @keyframes progress-fill { from{width:0%} to{width:var(--target-width)} }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
    .pulse-dot { animation: pulse-dot 1.2s ease-in-out infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spin { animation: spin 1s linear infinite; }
  </style>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#2D6A4F',accent:'#E63946'}}}}</script>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
// Auto-detect: if opened via Railway/server use same origin, else localhost
const API = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
  ? "http://localhost:8000"
  : window.location.origin;

// ── Utils ──────────────────────────────────────────────────────────────────
const fmt = p => p != null ? `${Number(p).toFixed(2)} ₾` : "—";

function wa(product) {
  const t = `🛒 ${product.product_name}\n💰 ${fmt(product.current_price)}\n🏪 ${product.store_name}\n🔗 ${product.product_url}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(t)}`, "_blank");
}

async function api(path, opts = {}) {
  // Hard timeout: 25s for search, 35s for basket — after that show error
  const timeoutMs = path.includes("basket") ? 35000 : 25000;
  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const r = await fetch(`${API}${path}`, {
      headers: {"Content-Type": "application/json"},
      signal: controller.signal,
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `HTTP ${r.status}`);
    return r.json();
  } catch (e) {
    if (e.name === "AbortError") throw new Error("მოთხოვნა ძალიან დიდხანს გაგრძელდა. სერვერი შეამოწმე.");
    throw e;
  } finally {
    clearTimeout(tid);
  }
}

function requestNotifications() {
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function sendNotification(title, body, url) {
  if (Notification.permission === "granted") {
    const n = new Notification(title, { body, icon: "🛒" });
    if (url) n.onclick = () => window.open(url, "_blank");
  }
}

// ── Progress Indicator ─────────────────────────────────────────────────────
const STORES = ["Carrefour","Spar","Nikora","Smart","Goodwill","GPC","Aversi","PSP","Ili"];

const SEARCH_STEPS = [
  { at: 0,  label: "ვუკავშირდებით მაღაზიებს...",       phase: "scraping" },
  { at: 30, label: "ვაგროვებთ ფასებს...",               phase: "scraping" },
  { at: 55, label: "AI ადარებს შედეგებს...",            phase: "ai"       },
  { at: 78, label: "AI ამზადებს რეზიუმეს...",           phase: "ai"       },
  { at: 92, label: "თითქმის დასრულდა...",               phase: "done"     },
];

const BASKET_STEPS = [
  { at: 0,  label: "ყველა პროდუქტს ყველა მაღაზიაში ვეძებთ..." },
  { at: 35, label: "ვაგროვებთ ფასებს..." },
  { at: 60, label: "AI ადარებს კალათებს..." },
  { at: 82, label: "AI ანგარიშობს საუკეთესო სტრატეგიას..." },
  { at: 94, label: "თითქმის მზადაა..." },
];

function useElapsedProgress(loading, totalMs = 16000) {
  const [pct, setPct] = useState(0);
  const start = useRef(null);
  const raf   = useRef(null);

  useEffect(() => {
    if (!loading) { setPct(0); start.current = null; return; }
    start.current = performance.now();
    const tick = () => {
      const elapsed = performance.now() - start.current;
      // Eased progress: approaches 96% asymptotically so it never "finishes" early
      const raw = Math.min(elapsed / totalMs, 1);
      const eased = 1 - Math.pow(1 - raw, 2.2);
      setPct(Math.min(Math.floor(eased * 96), 96));
      raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [loading, totalMs]);

  return pct;
}

function SearchProgress({ loading, isBasket }) {
  const steps   = isBasket ? BASKET_STEPS : SEARCH_STEPS;
  const totalMs = isBasket ? 20000 : 16000;
  const pct     = useElapsedProgress(loading, totalMs);
  if (!loading) return null;

  const step = [...steps].reverse().find(s => pct >= s.at) || steps[0];

  return (
    <div className="mt-6 bg-white rounded-2xl shadow-md p-6">
      {/* Store dots — light up randomly while scraping */}
      <div className="flex flex-wrap justify-center gap-2 mb-5">
        {STORES.map((store, i) => {
          const lit = pct > 5 && pct < 56;
          const delay = `${(i * 0.18).toFixed(2)}s`;
          return (
            <div key={store} className="flex flex-col items-center gap-1">
              <div
                className={`w-2.5 h-2.5 rounded-full transition-colors duration-500 ${lit ? 'bg-primary pulse-dot' : pct >= 56 ? 'bg-primary' : 'bg-gray-200'}`}
                style={lit ? {animationDelay: delay} : {}}
              />
              <span className="text-xs text-gray-400 hidden sm:block">{store}</span>
            </div>
          );
        })}
      </div>

      {/* Progress bar */}
      <div className="w-full bg-gray-100 rounded-full h-2.5 mb-3 overflow-hidden">
        <div
          className="h-2.5 rounded-full transition-all duration-700 ease-out"
          style={{
            width: `${pct}%`,
            background: pct < 55
              ? 'linear-gradient(90deg, #2D6A4F, #52b788)'
              : 'linear-gradient(90deg, #2D6A4F, #1a936f)',
          }}
        />
      </div>

      {/* Status label */}
      <div className="flex items-center justify-between">
        <p className="text-sm text-gray-600 font-medium flex items-center gap-2">
          <span className="inline-block w-3 h-3 border-2 border-primary border-t-transparent rounded-full spin"/>
          {step.label}
        </p>
        <span className="text-xs text-gray-400 font-mono">{pct}%</span>
      </div>

      {/* Phase hint */}
      <p className="text-xs text-gray-400 mt-2 text-center">
        {pct < 55
          ? `ყველა მაღაზია ერთდროულად — 9 სქრეიპერი პარალელურად`
          : `Claude AI აანალიზებს შედეგებს...`}
      </p>
    </div>
  );
}

// ── Skeleton ───────────────────────────────────────────────────────────────
function Skel() {
  return <div className="bg-white rounded-2xl shadow p-4 flex flex-col gap-3">
    <div className="skeleton h-36 rounded-xl"/>
    <div className="skeleton h-4 rounded w-3/4"/>
    <div className="skeleton h-4 rounded w-1/2"/>
    <div className="skeleton h-8 rounded w-1/3"/>
  </div>;
}

// ── Product Card ───────────────────────────────────────────────────────────
function ProductCard({ product, rank, onAddToList, onSetAlert }) {
  const cheapest = product.is_cheapest || rank === 0;
  const disc = product.discount_percent > 0;
  const [imgErr, setImgErr] = useState(false);
  return (
    <div className={`bg-white rounded-2xl shadow card-hover p-4 flex flex-col gap-3 relative border-2 ${cheapest?'border-primary':'border-transparent'}`}>
      <div className="absolute top-3 left-3 flex flex-col gap-1 z-10">
        {cheapest && <span className="bg-primary text-white text-xs font-bold px-2 py-1 rounded-full shadow">საუკეთესო ფასი ✓</span>}
        {disc && <span className="bg-accent text-white text-xs font-bold px-2 py-1 rounded-full shadow">{product.discount_percent}% ფასდაკლება</span>}
      </div>
      <div className="absolute top-3 right-3">
        <span className="bg-gray-100 text-gray-600 text-xs font-semibold px-2 py-1 rounded-full">{product.store_name}</span>
      </div>
      <div className="h-36 flex items-center justify-center bg-gray-50 rounded-xl mt-2 overflow-hidden">
        {product.image_url && !imgErr
          ? <img src={product.image_url} alt={product.product_name} className="h-full w-full object-contain" onError={()=>setImgErr(true)}/>
          : <span className="text-5xl opacity-30">🛍️</span>}
      </div>
      <p className="text-sm font-semibold text-gray-800 line-clamp-2 leading-snug">{product.product_name}</p>
      <div className="flex items-baseline gap-2">
        <span className={`text-2xl font-bold ${cheapest?'text-primary':'text-gray-900'}`}>{fmt(product.current_price)}</span>
        {product.original_price && product.original_price !== product.current_price &&
          <span className="text-sm text-gray-400 line-through">{fmt(product.original_price)}</span>}
      </div>
      {!product.in_stock && <span className="text-xs text-accent font-medium">მარაგში არ არის</span>}
      <div className="flex gap-1.5 mt-auto pt-2 flex-wrap">
        <a href={product.product_url} target="_blank" rel="noopener noreferrer"
           className="flex-1 text-center bg-primary text-white text-xs font-semibold py-2 rounded-xl hover:bg-opacity-90 transition min-w-[60px]">
          ნახვა →
        </a>
        <button onClick={()=>onAddToList(product)} title="სიაში დამატება"
                className="px-2.5 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-600 transition text-sm">📋</button>
        <button onClick={()=>onSetAlert(product)} title="შეტყობინება"
                className="px-2.5 py-2 bg-yellow-500 text-white rounded-xl hover:bg-yellow-600 transition text-sm">🔔</button>
        <button onClick={()=>wa(product)} title="WhatsApp"
                className="px-2.5 py-2 bg-green-500 text-white rounded-xl hover:bg-green-600 transition text-sm">📤</button>
      </div>
    </div>
  );
}

// ── Basket Analysis View ───────────────────────────────────────────────────
function BasketView({ result, loading }) {
  if (loading) return <SearchProgress loading={true} isBasket={true} />;
  if (!result) return null;

  const { per_item=[], basket_comparison=[], best_single_store, best_single_total, split_strategy=[], split_total, summary } = result;

  return (
    <div className="space-y-5 mt-4">
      {summary && (
        <div className="bg-green-50 border border-green-200 rounded-2xl p-4 text-sm text-green-800">
          🤖 <strong>AI რეზიუმე:</strong> {summary}
        </div>
      )}

      {/* Per-item cheapest */}
      {per_item.length > 0 && (
        <div className="bg-white rounded-2xl shadow p-4">
          <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
            <span className="text-xl">🏷️</span> ცალ-ცალკე ყველაზე იაფი
          </h3>
          <div className="space-y-3">
            {per_item.map((item, i) => (
              <div key={i} className="border border-gray-100 rounded-xl p-3">
                <div className="flex justify-between items-start flex-wrap gap-2">
                  <div>
                    <p className="font-semibold text-gray-800 text-sm">{item.item}</p>
                    <p className="text-xs text-gray-500 mt-0.5">{item.cheapest_store}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-lg font-bold text-primary">{fmt(item.cheapest_price)}</p>
                    {item.cheapest_url && (
                      <a href={item.cheapest_url} target="_blank" rel="noopener noreferrer"
                         className="text-xs text-blue-500 hover:underline">ნახვა →</a>
                    )}
                  </div>
                </div>
                {item.all_stores && item.all_stores.length > 1 && (
                  <details className="mt-2">
                    <summary className="text-xs text-gray-400 cursor-pointer hover:text-gray-600">
                      სხვა მაღაზიები ({item.all_stores.length})
                    </summary>
                    <div className="mt-2 grid grid-cols-2 gap-1">
                      {item.all_stores.sort((a,b)=>(a.price||999)-(b.price||999)).map((s,j)=>(
                        <div key={j} className="flex justify-between text-xs bg-gray-50 rounded-lg px-2 py-1.5">
                          <span className="text-gray-600">{s.store}</span>
                          <span className="font-medium">{fmt(s.price)}</span>
                        </div>
                      ))}
                    </div>
                  </details>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Basket comparison */}
      {basket_comparison.length > 0 && (
        <div className="bg-white rounded-2xl shadow p-4">
          <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
            <span className="text-xl">🛒</span> კალათა ერთ მაღაზიაში
          </h3>
          <div className="space-y-2">
            {basket_comparison.sort((a,b)=>(a.total||999)-(b.total||999)).map((s, i) => (
              <div key={i} className={`flex items-center justify-between p-3 rounded-xl border-2 ${i===0?'border-primary bg-green-50':'border-gray-100'}`}>
                <div>
                  <p className="font-semibold text-gray-800 text-sm flex items-center gap-1">
                    {i===0 && <span className="text-green-600">✓</span>} {s.store}
                  </p>
                  <p className="text-xs text-gray-400">{s.items_found}/{s.items_total} პროდუქტი</p>
                </div>
                <div className="text-right">
                  <p className={`text-lg font-bold ${i===0?'text-primary':'text-gray-700'}`}>{fmt(s.total)}</p>
                  {s.savings_vs_max > 0 && (
                    <p className="text-xs text-green-600">-{fmt(s.savings_vs_max)} დაზოგვა</p>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Split strategy */}
      {split_strategy.length > 0 && split_total && (
        <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4">
          <h3 className="font-bold text-blue-800 mb-1 flex items-center gap-2">
            <span className="text-xl">✂️</span> სმარტ სტრატეგია — სხვადასხვა მაღაზია
          </h3>
          <p className="text-xs text-blue-600 mb-3">თუ ამ გეგმით იყიდი, <strong>{fmt(split_total)}</strong> გამოვა</p>
          <div className="space-y-2">
            {split_strategy.map((s, i) => (
              <div key={i} className="bg-white rounded-xl p-3 flex justify-between items-start">
                <div>
                  <p className="font-semibold text-sm text-gray-800">{s.store}</p>
                  <p className="text-xs text-gray-500 mt-0.5">{(s.items||[]).join(", ")}</p>
                </div>
                <p className="font-bold text-blue-700">{fmt(s.subtotal)}</p>
              </div>
            ))}
          </div>
          {best_single_total && split_total < best_single_total && (
            <p className="text-xs text-green-700 mt-3 font-medium">
              🎉 ამ გეგმით {fmt(best_single_total - split_total)} დაზოგავ!
            </p>
          )}
        </div>
      )}
    </div>
  );
}

// ── Shopping List Panel ────────────────────────────────────────────────────
function ShoppingListPanel({ lists, onClose, onRefresh, onAnalyze }) {
  const [activeList, setActiveList] = useState(null);
  const [newListName, setNewListName] = useState("");
  const [newItem, setNewItem] = useState("");
  const [creating, setCreating] = useState(false);

  useEffect(() => {
    if (lists.length > 0 && !activeList) setActiveList(lists[0]);
  }, [lists]);

  const currentList = lists.find(l => l.id === activeList?.id);

  const createList = async () => {
    if (!newListName.trim()) return;
    const r = await api("/api/lists", {method:"POST", body:{name:newListName}});
    setNewListName(""); setCreating(false);
    await onRefresh();
    setActiveList({id: r.id});
  };

  const deleteList = async (id) => {
    if (!confirm("სია წაიშლება. გრძელდება?")) return;
    await api(`/api/lists/${id}`, {method:"DELETE"});
    setActiveList(null);
    onRefresh();
  };

  const addItem = async () => {
    if (!newItem.trim() || !currentList) return;
    await api(`/api/lists/${currentList.id}/items`, {method:"POST", body:{product_name:newItem}});
    setNewItem("");
    onRefresh();
  };

  const toggleItem = async (item, field) => {
    await api(`/api/lists/${currentList.id}/items/${item.id}`, {
      method:"PATCH", body:{[field]: !item[field]}
    });
    onRefresh();
  };

  const deleteItem = async (item) => {
    await api(`/api/lists/${currentList.id}/items/${item.id}`, {method:"DELETE"});
    onRefresh();
  };

  const uncheckedItems = currentList?.items?.filter(i=>!i.checked) || [];
  const checkedItems = currentList?.items?.filter(i=>i.checked) || [];

  return (
    <div className="fixed inset-0 z-50 flex">
      <div className="flex-1 bg-black/40" onClick={onClose}/>
      <div className="w-full max-w-md bg-white h-full overflow-y-auto slide-in flex flex-col">
        {/* Header */}
        <div className="bg-primary text-white p-4 flex items-center justify-between sticky top-0 z-10">
          <h2 className="font-bold text-lg">📋 საყიდლების სიები</h2>
          <button onClick={onClose} className="text-white text-2xl leading-none hover:opacity-70">×</button>
        </div>

        {/* List selector */}
        <div className="p-4 border-b bg-gray-50">
          <div className="flex gap-2 flex-wrap">
            {lists.map(l=>(
              <button key={l.id} onClick={()=>setActiveList(l)}
                className={`px-3 py-1.5 rounded-full text-sm font-medium transition ${activeList?.id===l.id?'bg-primary text-white':'bg-white border border-gray-200 text-gray-600 hover:border-primary'}`}>
                {l.name}
                <span className="ml-1 text-xs opacity-70">({l.items?.length||0})</span>
              </button>
            ))}
            {creating
              ? <div className="flex gap-1"><input value={newListName} onChange={e=>setNewListName(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&createList()} autoFocus placeholder="სიის სახელი"
                  className="border rounded-full px-3 py-1 text-sm w-32 focus:ring-1 focus:ring-primary"/>
                  <button onClick={createList} className="bg-primary text-white px-3 py-1 rounded-full text-sm">✓</button>
                  <button onClick={()=>setCreating(false)} className="text-gray-400 px-2">✕</button>
                </div>
              : <button onClick={()=>setCreating(true)}
                  className="px-3 py-1.5 rounded-full text-sm border border-dashed border-gray-300 text-gray-500 hover:border-primary hover:text-primary transition">
                  + ახალი სია
                </button>
            }
          </div>
        </div>

        {/* Active list */}
        {currentList ? (
          <div className="flex-1 flex flex-col">
            {/* List actions */}
            <div className="p-4 flex gap-2 border-b">
              <button onClick={()=>onAnalyze(currentList.items.filter(i=>!i.checked).map(i=>i.product_name))}
                disabled={uncheckedItems.length===0}
                className="flex-1 bg-primary text-white text-sm font-semibold py-2 rounded-xl hover:bg-opacity-90 transition disabled:opacity-40">
                🤖 ფასების ანალიზი
              </button>
              <button onClick={()=>deleteList(currentList.id)}
                className="px-3 py-2 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition text-sm">🗑️</button>
            </div>

            {/* Add item */}
            <div className="p-4 border-b">
              <div className="flex gap-2">
                <input value={newItem} onChange={e=>setNewItem(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addItem()}
                  placeholder="დაამატე პროდუქტი..."
                  className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-primary"/>
                <button onClick={addItem} className="bg-primary text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-opacity-90 transition">+</button>
              </div>
            </div>

            {/* Items */}
            <div className="flex-1 p-4 space-y-2 overflow-y-auto">
              {uncheckedItems.length===0 && checkedItems.length===0 && (
                <p className="text-center text-gray-400 text-sm py-8">სია ცარიელია</p>
              )}

              {uncheckedItems.map(item=>(
                <div key={item.id} className="flex items-center gap-3 p-3 bg-white border border-gray-100 rounded-xl hover:border-gray-200 transition group">
                  <button onClick={()=>toggleItem(item,"checked")}
                    className="w-5 h-5 rounded-full border-2 border-gray-300 hover:border-primary flex-shrink-0 transition"/>
                  <span className="flex-1 text-sm text-gray-800">{item.product_name}</span>
                  <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition">
                    <button onClick={()=>toggleItem(item,"frequent")} title="ხშირი"
                      className={`text-sm px-1.5 py-0.5 rounded-lg transition ${item.frequent?'bg-yellow-100 text-yellow-600':'hover:bg-gray-100 text-gray-400'}`}>
                      ★
                    </button>
                    <button onClick={()=>deleteItem(item)} className="text-sm px-1.5 py-0.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-500 transition">✕</button>
                  </div>
                </div>
              ))}

              {checkedItems.length > 0 && (
                <>
                  <p className="text-xs text-gray-400 pt-2 pb-1">✓ შეძენილი</p>
                  {checkedItems.map(item=>(
                    <div key={item.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl opacity-60 group">
                      <button onClick={()=>toggleItem(item,"checked")}
                        className="w-5 h-5 rounded-full bg-primary border-2 border-primary flex-shrink-0 flex items-center justify-center text-white text-xs">✓</button>
                      <span className="flex-1 text-sm text-gray-500 line-through">{item.product_name}</span>
                      <button onClick={()=>deleteItem(item)} className="text-sm px-1.5 py-0.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-500 transition opacity-0 group-hover:opacity-100">✕</button>
                    </div>
                  ))}
                </>
              )}

              {/* Frequent items */}
              {currentList.items?.some(i=>i.frequent) && (
                <div className="mt-4 pt-4 border-t">
                  <p className="text-xs text-yellow-600 font-medium mb-2">⭐ ხშირად ყიდული</p>
                  <div className="flex flex-wrap gap-1">
                    {currentList.items.filter(i=>i.frequent).map(i=>(
                      <span key={i.id} className="bg-yellow-50 border border-yellow-200 text-yellow-700 text-xs px-2 py-1 rounded-full">{i.product_name}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        ) : (
          <div className="flex-1 flex items-center justify-center text-gray-400 text-sm">
            <div className="text-center">
              <div className="text-4xl mb-2">📋</div>
              <p>შექმენი საყიდლების სია</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Alert Panel ────────────────────────────────────────────────────────────
function AlertPanel({ alerts, onClose, onRefresh }) {
  const [newProduct, setNewProduct] = useState("");
  const [newPrice, setNewPrice] = useState("");

  const createAlert = async () => {
    if (!newProduct.trim()) return;
    await api("/api/alerts", {
      method:"POST",
      body:{product_name:newProduct, target_price: newPrice ? parseFloat(newPrice) : null}
    });
    setNewProduct(""); setNewPrice("");
    onRefresh();
  };

  const deleteAlert = async (id) => {
    await api(`/api/alerts/${id}`, {method:"DELETE"});
    onRefresh();
  };

  const toggleAlert = async (alert) => {
    await api(`/api/alerts/${alert.id}`, {method:"PATCH", body:{active:!alert.active}});
    onRefresh();
  };

  return (
    <div className="fixed inset-0 z-50 flex">
      <div className="flex-1 bg-black/40" onClick={onClose}/>
      <div className="w-full max-w-md bg-white h-full overflow-y-auto slide-in flex flex-col">
        <div className="bg-yellow-500 text-white p-4 flex items-center justify-between sticky top-0">
          <div>
            <h2 className="font-bold text-lg">🔔 ფასის შეტყობინებები</h2>
            <p className="text-xs text-yellow-100 mt-0.5">გაცნობებ როცა ფასი დაეცემა</p>
          </div>
          <button onClick={onClose} className="text-white text-2xl leading-none hover:opacity-70">×</button>
        </div>

        {/* Create alert */}
        <div className="p-4 border-b bg-yellow-50">
          <p className="text-sm font-semibold text-gray-700 mb-3">ახალი შეტყობინება</p>
          <div className="space-y-2">
            <input value={newProduct} onChange={e=>setNewProduct(e.target.value)}
              placeholder="პროდუქტი (მაგ: ჰაგისი)"
              className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-yellow-400"/>
            <div className="flex gap-2">
              <input value={newPrice} onChange={e=>setNewPrice(e.target.value)} type="number" step="0.01"
                placeholder="მაქს. ფასი ₾ (არასავალდებულო)"
                className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-yellow-400"/>
              <button onClick={createAlert}
                className="bg-yellow-500 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-yellow-600 transition">
                + დამატება
              </button>
            </div>
            <p className="text-xs text-gray-400">ფასი ცარიელია = ნებისმიერ ფასდაკლებაზე გაცნობ</p>
          </div>
        </div>

        {/* Alerts list */}
        <div className="flex-1 p-4 space-y-3 overflow-y-auto">
          {alerts.length === 0 && (
            <p className="text-center text-gray-400 text-sm py-8">
              შეტყობინება არ გაქვს<br/>
              <span className="text-xs">დაამატე პროდუქტი, გაცნობებ ფასდაკლებაზე</span>
            </p>
          )}
          {alerts.map(alert=>(
            <div key={alert.id} className={`p-4 rounded-2xl border-2 transition ${alert.active?'border-yellow-200 bg-yellow-50':'border-gray-100 bg-gray-50 opacity-60'}`}>
              <div className="flex justify-between items-start">
                <div className="flex-1">
                  <p className="font-semibold text-gray-800 text-sm">{alert.product_name}</p>
                  <p className="text-xs text-gray-500 mt-0.5">
                    {alert.target_price ? `ფასი ≤ ${fmt(alert.target_price)}` : "ნებისმიერი ფასდაკლება"}
                  </p>
                  {alert.last_notified_at && (
                    <p className="text-xs text-green-600 mt-0.5">
                      ✓ ბოლო შეტყობინება: {new Date(alert.last_notified_at*1000).toLocaleDateString("ka-GE")}
                    </p>
                  )}
                </div>
                <div className="flex gap-2 items-center ml-3">
                  <button onClick={()=>toggleAlert(alert)}
                    className={`w-10 h-6 rounded-full transition-colors relative ${alert.active?'bg-yellow-400':'bg-gray-300'}`}>
                    <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${alert.active?'translate-x-4':'translate-x-0.5'}`}/>
                  </button>
                  <button onClick={()=>deleteAlert(alert.id)} className="text-gray-400 hover:text-red-500 transition text-lg leading-none">✕</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Add to List Modal ──────────────────────────────────────────────────────
function AddToListModal({ product, lists, onClose, onRefresh }) {
  const [selectedList, setSelectedList] = useState(lists[0]?.id || null);

  const addToList = async () => {
    if (!selectedList) return;
    await api(`/api/lists/${selectedList}/items`, {
      method:"POST", body:{product_name:product.product_name}
    });
    onRefresh();
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40">
      <div className="bg-white rounded-2xl shadow-xl p-5 w-full max-w-sm bounce-in">
        <h3 className="font-bold text-gray-800 mb-1">📋 სიაში დამატება</h3>
        <p className="text-sm text-gray-500 mb-4 truncate">{product.product_name}</p>

        {lists.length === 0 ? (
          <p className="text-sm text-gray-400 mb-4">სია არ გაქვს. ჯერ შექმენი.</p>
        ) : (
          <div className="space-y-2 mb-4">
            {lists.map(l=>(
              <label key={l.id} className={`flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition ${selectedList===l.id?'border-primary bg-green-50':'border-gray-100 hover:border-gray-200'}`}>
                <input type="radio" name="list" value={l.id} checked={selectedList===l.id} onChange={()=>setSelectedList(l.id)} className="accent-primary"/>
                <span className="text-sm font-medium text-gray-700">{l.name}</span>
                <span className="text-xs text-gray-400 ml-auto">({l.items?.length||0})</span>
              </label>
            ))}
          </div>
        )}

        <div className="flex gap-2">
          <button onClick={onClose} className="flex-1 py-2 border border-gray-200 rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition">გაუქმება</button>
          {lists.length > 0 && <button onClick={addToList} className="flex-1 py-2 bg-primary text-white rounded-xl text-sm font-semibold hover:bg-opacity-90 transition">დამატება</button>}
        </div>
      </div>
    </div>
  );
}

// ── Alert Notification Toast ───────────────────────────────────────────────
function AlertToast({ alerts, onClose }) {
  if (!alerts.length) return null;
  return (
    <div className="fixed bottom-4 right-4 z-50 space-y-2 max-w-sm">
      {alerts.slice(0,3).map((a,i)=>(
        <div key={i} className="bg-white border-2 border-yellow-400 rounded-2xl shadow-lg p-4 flex gap-3 bounce-in">
          <span className="text-2xl">🔔</span>
          <div className="flex-1 min-w-0">
            <p className="font-semibold text-gray-800 text-sm truncate">{a.product_name}</p>
            <p className="text-xs text-gray-600">{a.store} — <span className="text-primary font-bold">{fmt(a.current_price)}</span>
              {a.discount_percent && <span className="ml-1 text-accent">(-{a.discount_percent}%)</span>}
            </p>
            {a.product_url && <a href={a.product_url} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-500 hover:underline">ნახვა →</a>}
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-lg leading-none">×</button>
        </div>
      ))}
    </div>
  );
}

// ── Filter Bar ─────────────────────────────────────────────────────────────
function FilterBar({ sortBy, setSortBy, onlyDisc, setOnlyDisc }) {
  return (
    <div className="flex flex-wrap gap-3 items-center">
      <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
        className="border rounded-xl px-3 py-2 text-sm bg-white shadow-sm focus:ring-2 focus:ring-primary">
        <option value="price">ფასით ↑</option>
        <option value="discount">ფასდაკლებით ↓</option>
        <option value="store">მაღაზიით</option>
      </select>
      <label className="flex items-center gap-2 cursor-pointer select-none">
        <div onClick={()=>setOnlyDisc(!onlyDisc)} className={`w-11 h-6 rounded-full transition-colors relative ${onlyDisc?'bg-accent':'bg-gray-300'}`}>
          <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${onlyDisc?'translate-x-5':'translate-x-0.5'}`}/>
        </div>
        <span className="text-sm font-medium text-gray-700">მხოლოდ ფასდაკლებები</span>
      </label>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// Main App
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  // Search state
  const [query, setQuery]     = useState("");
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState([]);
  const [summary, setSummary] = useState("");
  const [source,  setSource]  = useState("");   // "cache" | "local_db" | "live"
  const [error, setError]     = useState("");
  const [sortBy, setSortBy]   = useState("price");
  const [onlyDisc, setOnlyDisc] = useState(false);

  // Basket state
  const [mode, setMode]               = useState("search"); // "search" | "basket"
  const [basketInput, setBasketInput] = useState("");
  const [basketItems, setBasketItems] = useState([]);
  const [basketLoading, setBasketLoading] = useState(false);
  const [basketResult, setBasketResult]   = useState(null);
  const [basketError, setBasketError]     = useState("");

  // Panels
  const [showLists, setShowLists]   = useState(false);
  const [showAlerts, setShowAlerts] = useState(false);

  // Lists & alerts data
  const [lists, setLists]   = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [addToListProduct, setAddToListProduct] = useState(null);
  const [alertProduct, setAlertProduct] = useState(null);
  const [toastAlerts, setToastAlerts]   = useState([]);

  // History
  const [history, setHistory] = useState(()=>{
    try{return JSON.parse(localStorage.getItem("searchHistory")||"[]")}catch{return[]}
  });

  const [trending, setTrending] = useState([]);

  // Load data
  const refreshLists  = useCallback(()=>api("/api/lists").then(d=>setLists(d.lists||[])).catch(()=>{}), []);
  const refreshAlerts = useCallback(()=>api("/api/alerts").then(d=>setAlerts(d.alerts||[])).catch(()=>{}), []);

  useEffect(()=>{
    requestNotifications();
    refreshLists();
    refreshAlerts();
    api("/api/trending").then(d=>setTrending(d.trending||[])).catch(()=>{});
  }, []);

  // Poll alerts every 5 minutes
  useEffect(()=>{
    const poll = ()=>{
      api("/api/alerts/check").then(d=>{
        const triggered = d.triggered||[];
        if(triggered.length){
          setToastAlerts(triggered);
          triggered.forEach(a=>{
            sendNotification(
              `🔔 ფასდაკლება: ${a.product_name}`,
              `${a.store} — ${fmt(a.current_price)} (${a.discount_percent}% ფასდაკლება)`,
              a.product_url
            );
          });
        }
      }).catch(()=>{});
    };
    poll();
    const id = setInterval(poll, 5*60*1000);
    return ()=>clearInterval(id);
  }, []);

  const saveHistory = (q) => {
    const updated = [q, ...history.filter(h=>h!==q)].slice(0,20);
    setHistory(updated);
    localStorage.setItem("searchHistory", JSON.stringify(updated));
  };

  // ── Search ──
  const doSearch = useCallback(async (q) => {
    const sq = (q||query).trim();
    if(!sq) return;
    setQuery(sq); setLoading(true); setError(""); setResults([]); setSummary(""); setSource("");
    saveHistory(sq);
    try {
      const data = await api("/api/search", {method:"POST", body:{query:sq}});
      setResults(data.results||[]);
      setSummary(data.summary||"");
      setSource(data.source||"live");
      if(data.alerts?.length) {
        setToastAlerts(data.alerts);
        data.alerts.forEach(a=>sendNotification(`🔔 ${a.product_name}`,`${a.store} — ${fmt(a.current_price)}`,a.product_url));
      }
    } catch(e){ setError(e.message); }
    finally{ setLoading(false); }
  }, [query, history]);

  // ── Basket ──
  const addBasketItem = () => {
    const t = basketInput.trim();
    if(!t || basketItems.includes(t)) return;
    setBasketItems([...basketItems, t]);
    setBasketInput("");
  };

  const removeBasketItem = (item) => setBasketItems(basketItems.filter(i=>i!==item));

  const analyzeBasket = async (itemsOverride) => {
    const items = itemsOverride || basketItems;
    if(!items.length) return;
    setMode("basket"); setBasketLoading(true); setBasketError(""); setBasketResult(null);
    try {
      const data = await api("/api/basket", {method:"POST", body:{items}});
      setBasketResult(data);
    } catch(e){ setBasketError(e.message); }
    finally { setBasketLoading(false); }
  };

  // ── Set alert quick ──
  const quickAlert = async (product) => {
    await api("/api/alerts",{method:"POST",body:{product_name:product.product_name}});
    refreshAlerts();
    alert(`✅ შეტყობინება დაყენდა: ${product.product_name}`);
  };

  // Filtered & sorted results
  const displayed = [...results]
    .filter(r=>!onlyDisc || r.discount_percent>0)
    .sort((a,b)=>{
      if(sortBy==="price")    return (a.current_price||999)-(b.current_price||999);
      if(sortBy==="discount") return (b.discount_percent||0)-(a.discount_percent||0);
      if(sortBy==="store")    return a.store_name.localeCompare(b.store_name);
      return 0;
    });

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <header className="bg-primary text-white shadow-lg sticky top-0 z-40">
        <div className="max-w-5xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-2xl">🛒</span>
              <div>
                <h1 className="font-bold text-lg leading-tight">ფასების შემდარებელი</h1>
                <p className="text-green-200 text-xs">AI • სუპერმარკეტები • აფთიაქები</p>
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={()=>{setShowAlerts(true);refreshAlerts();}}
                className="relative bg-white/10 hover:bg-white/20 text-white px-3 py-2 rounded-xl text-sm transition flex items-center gap-1">
                🔔
                {alerts.filter(a=>a.active).length>0&&<span className="absolute -top-1 -right-1 bg-accent text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">{alerts.filter(a=>a.active).length}</span>}
              </button>
              <button onClick={()=>{setShowLists(true);refreshLists();}}
                className="bg-white/10 hover:bg-white/20 text-white px-3 py-2 rounded-xl text-sm transition flex items-center gap-1">
                📋 სიები
              </button>
            </div>
          </div>

          {/* Mode tabs */}
          <div className="flex gap-1 mt-3 bg-black/20 rounded-xl p-1">
            <button onClick={()=>setMode("search")}
              className={`flex-1 py-1.5 rounded-lg text-sm font-medium transition ${mode==="search"?'bg-white text-primary shadow':'text-white/80 hover:text-white'}`}>
              🔍 ძიება
            </button>
            <button onClick={()=>setMode("basket")}
              className={`flex-1 py-1.5 rounded-lg text-sm font-medium transition ${mode==="basket"?'bg-white text-primary shadow':'text-white/80 hover:text-white'}`}>
              🛒 კალათა {basketItems.length>0&&<span className="ml-1 bg-accent text-white text-xs px-1.5 rounded-full">{basketItems.length}</span>}
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 py-6">

        {/* ═══ SEARCH MODE ═══ */}
        {mode==="search" && (
          <>
            <div className="bg-white rounded-2xl shadow-md p-4">
              <div className="flex gap-2">
                <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()}
                  placeholder="მაგ: ჰაგისი, ამოქსიცილინი, კარაქი..."
                  className="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-base focus:ring-2 focus:ring-primary transition" autoFocus/>
                <button onClick={()=>doSearch()} disabled={loading}
                  className="bg-primary text-white px-5 py-3 rounded-xl font-semibold hover:bg-opacity-90 transition disabled:opacity-60 whitespace-nowrap">
                  {loading?"⏳":"🔍"} ძიება
                </button>
              </div>
              {!loading&&!results.length&&history.length>0&&(
                <div className="mt-2">
                  <p className="text-xs text-gray-400 mb-1">ბოლო ძიებები:</p>
                  <div className="flex flex-wrap gap-1">
                    {history.slice(0,8).map(q=>(
                      <button key={q} onClick={()=>doSearch(q)} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded-full transition">{q}</button>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* Trending */}
            {!loading&&!results.length&&trending.length>0&&(
              <div className="mt-4">
                <p className="text-sm font-semibold text-gray-500 mb-2">🔥 პოპულარული დღეს</p>
                <div className="flex flex-wrap gap-2">
                  {trending.map(t=>(
                    <button key={t.query} onClick={()=>doSearch(t.query)}
                      className="bg-white border border-gray-200 text-gray-700 text-sm px-3 py-1.5 rounded-full shadow-sm hover:border-primary hover:text-primary transition">
                      {t.query} <span className="text-xs text-gray-400">({t.count})</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {error&&<div className="mt-4 bg-red-50 border border-red-200 text-red-700 rounded-2xl p-4 text-sm">⚠️ {error}</div>}

            {loading&&(
              <div>
                <SearchProgress loading={true} isBasket={false} />
              </div>
            )}

            {!loading&&results.length>0&&(
              <div className="mt-6">
                {/* Source badge + summary */}
                <div className="flex items-start gap-2 mb-4 flex-wrap">
                  {source==="local_db" && <span className="inline-flex items-center gap-1 bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-full shrink-0">⚡ ბაზიდან — მყისიერი</span>}
                  {source==="cache"    && <span className="inline-flex items-center gap-1 bg-gray-100 text-gray-600 text-xs font-bold px-2.5 py-1 rounded-full shrink-0">💾 ქეში</span>}
                  {source==="live"     && <span className="inline-flex items-center gap-1 bg-orange-100 text-orange-700 text-xs font-bold px-2.5 py-1 rounded-full shrink-0">🌐 პირდაპირი ძიება</span>}
                  {summary && <p className="text-sm text-green-800 bg-green-50 border border-green-200 rounded-2xl px-4 py-2 flex-1">🤖 {summary}</p>}
                </div>
                <FilterBar sortBy={sortBy} setSortBy={setSortBy} onlyDisc={onlyDisc} setOnlyDisc={setOnlyDisc}/>
                <p className="text-sm text-gray-500 mt-3 mb-4">ნაპოვნია <strong>{displayed.length}</strong> შედეგი</p>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {displayed.map((p,i)=>(
                    <ProductCard key={`${p.store_name}-${i}`} product={p} rank={i}
                      onAddToList={(prod)=>lists.length>0?setAddToListProduct(prod):alert("ჯერ შექმენი სია 📋")}
                      onSetAlert={quickAlert}/>
                  ))}
                </div>
              </div>
            )}

            {!loading&&!error&&!results.length&&(
              <div className="text-center py-16 text-gray-400 mt-4">
                <div className="text-6xl mb-4">🛒</div>
                <p className="text-lg font-medium text-gray-600">რა გსურთ მოძებნოთ?</p>
                <div className="mt-4 flex flex-wrap justify-center gap-2">
                  {["ჰაგისი","ამოქსიცილინი","ძეხვი","კარაქი","შამპუნი"].map(s=>(
                    <button key={s} onClick={()=>doSearch(s)}
                      className="bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-full shadow-sm hover:border-primary hover:text-primary transition text-sm">{s}</button>
                  ))}
                </div>
              </div>
            )}
          </>
        )}

        {/* ═══ BASKET MODE ═══ */}
        {mode==="basket" && (
          <div>
            {/* Add items */}
            <div className="bg-white rounded-2xl shadow-md p-4 mb-4">
              <h2 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span className="text-xl">🛒</span> კალათის ანალიზი
              </h2>
              <p className="text-xs text-gray-500 mb-3">დაამატე პროდუქტები, AI გეტყვის სად ყიდეს სულ იაფად</p>

              <div className="flex gap-2 mb-3">
                <input value={basketInput} onChange={e=>setBasketInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addBasketItem()}
                  placeholder="მაგ: კოლა, კვერცხი, ზეთი..."
                  className="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary transition"/>
                <button onClick={addBasketItem} className="bg-primary text-white px-4 py-2.5 rounded-xl text-sm font-semibold hover:bg-opacity-90 transition">+</button>
              </div>

              {/* Basket items list */}
              {basketItems.length>0&&(
                <div className="flex flex-wrap gap-2 mb-4">
                  {basketItems.map(item=>(
                    <span key={item} className="flex items-center gap-1.5 bg-primary/10 text-primary border border-primary/20 px-3 py-1 rounded-full text-sm font-medium">
                      {item}
                      <button onClick={()=>removeBasketItem(item)} className="text-primary/60 hover:text-primary leading-none text-base">×</button>
                    </span>
                  ))}
                </div>
              )}

              {/* Quick add suggestions */}
              {basketItems.length===0&&(
                <div className="mt-2">
                  <p className="text-xs text-gray-400 mb-2">სწრაფი მაგალითი:</p>
                  <button onClick={()=>setBasketItems(["კოლა","კვერცხი","ზეთი ავედოვი"])}
                    className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-full transition">
                    კოლა + კვერცხი + ზეთი
                  </button>
                </div>
              )}

              <div className="flex gap-2 mt-3">
                <button onClick={()=>analyzeBasket()} disabled={basketItems.length===0||basketLoading}
                  className="flex-1 bg-primary text-white py-2.5 rounded-xl font-semibold hover:bg-opacity-90 transition disabled:opacity-40 text-sm flex items-center justify-center gap-2">
                  {basketLoading?<><span className="animate-spin">⏳</span> ვანალიზებ...</>:<>🤖 ფასების ანალიზი</>}
                </button>
                {basketItems.length>0&&<button onClick={()=>setBasketItems([])}
                  className="px-4 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-500 hover:bg-gray-50 transition">გასუფთავება</button>}
              </div>
            </div>

            {basketError&&<div className="bg-red-50 border border-red-200 text-red-700 rounded-2xl p-4 text-sm mb-4">⚠️ {basketError}</div>}

            <SearchProgress loading={basketLoading} isBasket={true} />
            {!basketLoading && <BasketView result={basketResult} loading={false}/>}

            {!basketLoading&&!basketResult&&basketItems.length===0&&(
              <div className="text-center py-16 text-gray-400">
                <div className="text-6xl mb-4">🛒</div>
                <p className="text-lg font-medium text-gray-600">კალათა ცარიელია</p>
                <p className="text-sm mt-1">დაამატე პროდუქტები ზემოთ</p>
              </div>
            )}
          </div>
        )}
      </main>

      {/* Footer */}
      <footer className="text-center text-xs text-gray-400 py-6">Georgian Price Finder • ფასები განახლდება ყოველ 2 საათში</footer>

      {/* Panels */}
      {showLists&&<ShoppingListPanel lists={lists} onClose={()=>setShowLists(false)} onRefresh={refreshLists} onAnalyze={(items)=>{setMode("basket");setBasketItems(items);setShowLists(false);}}/>}
      {showAlerts&&<AlertPanel alerts={alerts} onClose={()=>setShowAlerts(false)} onRefresh={refreshAlerts}/>}

      {/* Add to list modal */}
      {addToListProduct&&<AddToListModal product={addToListProduct} lists={lists} onClose={()=>setAddToListProduct(null)} onRefresh={refreshLists}/>}

      {/* Alert toasts */}
      {toastAlerts.length>0&&<AlertToast alerts={toastAlerts} onClose={()=>setToastAlerts([])}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
