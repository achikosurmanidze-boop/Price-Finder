<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ფასების შემდარებელი 🇬🇪</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
    .skeleton{background:linear-gradient(90deg,#e8e8e8 25%,#f5f5f5 50%,#e8e8e8 75%);background-size:800px 100%;animation:shimmer 1.5s infinite}
    .card-hover{transition:transform .2s,box-shadow .2s}
    .card-hover:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.13)}
    input:focus,textarea:focus{outline:none}
    @keyframes slide-in{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    .slide-in{animation:slide-in .3s ease}
    @keyframes fade-up{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
    .fade-up{animation:fade-up .35s ease}
    @keyframes bounce-in{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
    .bounce-in{animation:bounce-in .25s ease}
    @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}
    .pulse-dot{animation:pulse-dot 1.2s ease-in-out infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
    ::-webkit-scrollbar-track{background:transparent}
    /* Desktop sidebar scroll independent */
    .sidebar-scroll{height:calc(100vh - 64px);overflow-y:auto;position:sticky;top:64px}
  </style>
  <script>
    tailwind.config={theme:{extend:{colors:{primary:'#1B4332',accent:'#E63946',mid:'#2D6A4F',light:'#52b788'}}}}
  </script>
</head>
<body class="bg-slate-50 antialiased">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = (window.location.hostname==="localhost"||window.location.hostname==="127.0.0.1")
  ? "http://localhost:8000"
  : window.location.origin;

const fmt = p => p!=null ? `${Number(p).toFixed(2)} ₾` : "—";

function wa(product){
  const t=`🛒 ${product.product_name}\n💰 ${fmt(product.current_price)}\n🏪 ${product.store_name}\n🔗 ${product.product_url}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(t)}`,"_blank");
}

async function api(path, opts={}){
  const timeoutMs=path.includes("basket")?35000:25000;
  const controller=new AbortController();
  const tid=setTimeout(()=>controller.abort(),timeoutMs);
  try{
    const r=await fetch(`${API}${path}`,{
      headers:{"Content-Type":"application/json"},
      signal:controller.signal,...opts,
      body:opts.body?JSON.stringify(opts.body):undefined,
    });
    if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error||`HTTP ${r.status}`);
    return r.json();
  }catch(e){
    if(e.name==="AbortError") throw new Error("მოთხოვნა ძალიან დიდხანს გაგრძელდა.");
    throw e;
  }finally{ clearTimeout(tid); }
}

function requestNotifications(){
  if("Notification" in window&&Notification.permission==="default") Notification.requestPermission();
}
function sendNotification(title,body,url){
  if(Notification.permission==="granted"){
    const n=new Notification(title,{body,icon:"🛒"});
    if(url) n.onclick=()=>window.open(url,"_blank");
  }
}

// ── Progress ───────────────────────────────────────────────────────────────
const STORES=["Carrefour","Spar","Nikora","Smart","Goodwill","GPC","Aversi","PSP","Ili"];
const SEARCH_STEPS=[
  {at:0, label:"ვუკავშირდებით მაღაზიებს..."},
  {at:30,label:"ვაგროვებთ ფასებს..."},
  {at:55,label:"AI ადარებს შედეგებს..."},
  {at:78,label:"AI ამზადებს რეზიუმეს..."},
  {at:92,label:"თითქმის დასრულდა..."},
];
const BASKET_STEPS=[
  {at:0, label:"ყველა პროდუქტს ყველა მაღაზიაში ვეძებთ..."},
  {at:35,label:"ვაგროვებთ ფასებს..."},
  {at:60,label:"AI ადარებს კალათებს..."},
  {at:82,label:"AI ანგარიშობს საუკეთესო სტრატეგიას..."},
  {at:94,label:"თითქმის მზადაა..."},
];

function useElapsedProgress(loading,totalMs=16000){
  const [pct,setPct]=useState(0);
  const start=useRef(null);
  const raf=useRef(null);
  useEffect(()=>{
    if(!loading){setPct(0);start.current=null;return;}
    start.current=performance.now();
    const tick=()=>{
      const elapsed=performance.now()-start.current;
      const raw=Math.min(elapsed/totalMs,1);
      const eased=1-Math.pow(1-raw,2.2);
      setPct(Math.min(Math.floor(eased*96),96));
      raf.current=requestAnimationFrame(tick);
    };
    raf.current=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf.current);
  },[loading,totalMs]);
  return pct;
}

function SearchProgress({loading,isBasket}){
  const steps=isBasket?BASKET_STEPS:SEARCH_STEPS;
  const totalMs=isBasket?20000:16000;
  const pct=useElapsedProgress(loading,totalMs);
  if(!loading) return null;
  const step=[...steps].reverse().find(s=>pct>=s.at)||steps[0];
  return(
    <div className="mt-6 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 fade-up">
      <div className="flex flex-wrap justify-center gap-3 mb-5">
        {STORES.map((store,i)=>{
          const lit=pct>5&&pct<56;
          return(
            <div key={store} className="flex flex-col items-center gap-1.5">
              <div className={`w-2.5 h-2.5 rounded-full transition-colors duration-500 ${lit?'bg-light pulse-dot':pct>=56?'bg-primary':'bg-gray-200'}`}
                style={lit?{animationDelay:`${(i*.18).toFixed(2)}s`}:{}}/>
              <span className="text-xs text-gray-400 hidden sm:block">{store}</span>
            </div>
          );
        })}
      </div>
      <div className="w-full bg-gray-100 rounded-full h-2 mb-3 overflow-hidden">
        <div className="h-2 rounded-full transition-all duration-700 ease-out"
          style={{width:`${pct}%`,background:pct<55?'linear-gradient(90deg,#1B4332,#52b788)':'linear-gradient(90deg,#1B4332,#2D6A4F)'}}/>
      </div>
      <div className="flex items-center justify-between">
        <p className="text-sm text-gray-600 font-medium flex items-center gap-2">
          <span className="inline-block w-3 h-3 border-2 border-primary border-t-transparent rounded-full spin"/>
          {step.label}
        </p>
        <span className="text-xs text-gray-400 font-mono tabular-nums">{pct}%</span>
      </div>
      <p className="text-xs text-gray-400 mt-2 text-center">
        {pct<55?"9 მაღაზია პარალელურად":"Claude AI აანალიზებს..."}
      </p>
    </div>
  );
}

// ── Skeleton ───────────────────────────────────────────────────────────────
function Skel(){
  return(
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-col gap-3">
      <div className="skeleton h-40 rounded-xl"/>
      <div className="skeleton h-3.5 rounded w-3/4"/>
      <div className="skeleton h-3.5 rounded w-1/2"/>
      <div className="skeleton h-8 rounded-xl w-1/3"/>
    </div>
  );
}

// ── Result Row (list view) ─────────────────────────────────────────────────
function ResultRow({product,rank,onAddToList,onSetAlert}){
  const cheapest=product.is_cheapest||rank===0;
  const disc=product.discount_percent>0;
  const [imgErr,setImgErr]=useState(false);
  return(
    <div className={`flex items-center gap-3 px-4 py-3 border-b border-gray-100 last:border-0 transition group ${cheapest?'bg-emerald-50':'hover:bg-slate-50'}`}>
      {/* Thumbnail — desktop only */}
      <div className="hidden sm:flex w-11 h-11 shrink-0 items-center justify-center bg-white rounded-xl border border-gray-100 overflow-hidden">
        {product.image_url&&!imgErr
          ?<img src={product.image_url} alt="" className="w-full h-full object-contain" onError={()=>setImgErr(true)}/>
          :<span className="text-xl opacity-25">🛍️</span>}
      </div>

      {/* Store badge */}
      <div className="shrink-0 w-24 sm:w-28">
        <span className={`inline-block text-xs font-bold px-2.5 py-1 rounded-lg ${cheapest?'bg-primary text-white':'bg-slate-100 text-slate-600'}`}>
          {product.store_name}
        </span>
        {cheapest&&<p className="text-xs text-emerald-600 font-semibold mt-0.5 pl-0.5">✓ იაფი</p>}
      </div>

      {/* Product name */}
      <div className="flex-1 min-w-0">
        <p className="text-sm font-medium text-gray-800 line-clamp-2 leading-snug">{product.product_name}</p>
        {disc&&<span className="text-xs text-accent font-semibold">-{product.discount_percent}% ფასდაკლება</span>}
        {!product.in_stock&&<span className="text-xs text-gray-400 ml-2">• მარაგში არ არის</span>}
      </div>

      {/* Price */}
      <div className="shrink-0 text-right">
        <p className={`text-lg font-bold tabular-nums leading-tight ${cheapest?'text-primary':'text-gray-800'}`}>{fmt(product.current_price)}</p>
        {product.original_price&&product.original_price!==product.current_price&&
          <p className="text-xs text-gray-400 line-through">{fmt(product.original_price)}</p>}
      </div>

      {/* Actions */}
      <div className="shrink-0 flex items-center gap-1">
        <a href={product.product_url} target="_blank" rel="noopener noreferrer"
           className={`text-xs font-bold px-3 py-2 rounded-xl transition whitespace-nowrap ${cheapest?'bg-primary text-white hover:bg-mid':'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
          ნახვა →
        </a>
        <button onClick={()=>onAddToList(product)} title="სიაში"
          className="p-2 text-gray-300 hover:text-blue-500 hover:bg-blue-50 rounded-xl transition opacity-0 group-hover:opacity-100">📋</button>
        <button onClick={()=>onSetAlert(product)} title="შეტყობინება"
          className="p-2 text-gray-300 hover:text-amber-500 hover:bg-amber-50 rounded-xl transition opacity-0 group-hover:opacity-100">🔔</button>
        <button onClick={()=>wa(product)} title="WhatsApp"
          className="hidden sm:block p-2 text-gray-300 hover:text-green-500 hover:bg-green-50 rounded-xl transition opacity-0 group-hover:opacity-100">📤</button>
      </div>
    </div>
  );
}

// ── Basket View ────────────────────────────────────────────────────────────
function BasketView({result}){
  if(!result) return null;
  const {per_item=[],basket_comparison=[],best_single_store,best_single_total,split_strategy=[],split_total,summary}=result;
  return(
    <div className="space-y-4 mt-4 fade-up">
      {summary&&(
        <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 text-sm text-emerald-800">
          🤖 <strong>AI რეზიუმე:</strong> {summary}
        </div>
      )}
      {per_item.length>0&&(
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2 text-base">
            <span className="text-xl">🏷️</span> ცალ-ცალკე ყველაზე იაფი
          </h3>
          <div className="space-y-3">
            {per_item.map((item,i)=>(
              <div key={i} className="border border-gray-100 rounded-xl p-3 hover:border-gray-200 transition">
                <div className="flex justify-between items-start flex-wrap gap-2">
                  <div>
                    <p className="font-semibold text-gray-800 text-sm">{item.item}</p>
                    <p className="text-xs text-gray-500 mt-0.5">{item.cheapest_store}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-lg font-bold text-primary">{fmt(item.cheapest_price)}</p>
                    {item.cheapest_url&&<a href={item.cheapest_url} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-500 hover:underline">ნახვა →</a>}
                  </div>
                </div>
                {item.all_stores&&item.all_stores.length>1&&(
                  <details className="mt-2">
                    <summary className="text-xs text-gray-400 cursor-pointer hover:text-gray-600">სხვა მაღაზიები ({item.all_stores.length})</summary>
                    <div className="mt-2 grid grid-cols-2 gap-1">
                      {item.all_stores.sort((a,b)=>(a.price||999)-(b.price||999)).map((s,j)=>(
                        <div key={j} className="flex justify-between text-xs bg-gray-50 rounded-lg px-2 py-1.5">
                          <span className="text-gray-600">{s.store}</span>
                          <span className="font-medium">{fmt(s.price)}</span>
                        </div>
                      ))}
                    </div>
                  </details>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
      {basket_comparison.length>0&&(
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2 text-base">
            <span className="text-xl">🛒</span> კალათა ერთ მაღაზიაში
          </h3>
          <div className="space-y-2">
            {basket_comparison.sort((a,b)=>(a.total||999)-(b.total||999)).map((s,i)=>(
              <div key={i} className={`flex items-center justify-between p-3 rounded-xl border-2 ${i===0?'border-primary bg-emerald-50':'border-gray-100'}`}>
                <div>
                  <p className="font-semibold text-gray-800 text-sm flex items-center gap-1">
                    {i===0&&<span className="text-emerald-600">✓</span>} {s.store}
                  </p>
                  <p className="text-xs text-gray-400">{s.items_found}/{s.items_total} პროდუქტი</p>
                </div>
                <div className="text-right">
                  <p className={`text-lg font-bold ${i===0?'text-primary':'text-gray-700'}`}>{fmt(s.total)}</p>
                  {s.savings_vs_max>0&&<p className="text-xs text-emerald-600">-{fmt(s.savings_vs_max)}</p>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {split_strategy.length>0&&split_total&&(
        <div className="bg-blue-50 border border-blue-200 rounded-2xl p-5">
          <h3 className="font-bold text-blue-800 mb-1 flex items-center gap-2">
            <span className="text-xl">✂️</span> სმარტ სტრატეგია
          </h3>
          <p className="text-xs text-blue-600 mb-3">სხვადასხვა მაღაზიებში — სულ <strong>{fmt(split_total)}</strong></p>
          <div className="space-y-2">
            {split_strategy.map((s,i)=>(
              <div key={i} className="bg-white rounded-xl p-3 flex justify-between items-start">
                <div>
                  <p className="font-semibold text-sm text-gray-800">{s.store}</p>
                  <p className="text-xs text-gray-500 mt-0.5">{(s.items||[]).join(", ")}</p>
                </div>
                <p className="font-bold text-blue-700">{fmt(s.subtotal)}</p>
              </div>
            ))}
          </div>
          {best_single_total&&split_total<best_single_total&&(
            <p className="text-xs text-emerald-700 mt-3 font-semibold">🎉 ამ გეგმით {fmt(best_single_total-split_total)} დაზოგავ!</p>
          )}
        </div>
      )}
    </div>
  );
}

// ── Filter Bar ─────────────────────────────────────────────────────────────
function FilterBar({sortBy,setSortBy,onlyDisc,setOnlyDisc}){
  return(
    <div className="flex flex-wrap gap-3 items-center">
      <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
        className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white shadow-sm focus:ring-2 focus:ring-primary">
        <option value="price">ფასით ↑</option>
        <option value="discount">ფასდაკლებით ↓</option>
        <option value="store">მაღაზიით</option>
      </select>
      <label className="flex items-center gap-2 cursor-pointer select-none">
        <div onClick={()=>setOnlyDisc(!onlyDisc)}
          className={`w-11 h-6 rounded-full transition-colors relative ${onlyDisc?'bg-accent':'bg-gray-300'}`}>
          <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${onlyDisc?'translate-x-5':'translate-x-0.5'}`}/>
        </div>
        <span className="text-sm font-medium text-gray-700">მხოლოდ ფასდაკლებები</span>
      </label>
    </div>
  );
}

// ── Mobile overlay panels ──────────────────────────────────────────────────
function ShoppingListPanel({lists,onClose,onRefresh,onAnalyze}){
  const [activeList,setActiveList]=useState(null);
  const [newListName,setNewListName]=useState("");
  const [newItem,setNewItem]=useState("");
  const [creating,setCreating]=useState(false);
  useEffect(()=>{if(lists.length>0&&!activeList)setActiveList(lists[0]);},[lists]);
  const currentList=lists.find(l=>l.id===activeList?.id);
  const createList=async()=>{
    if(!newListName.trim())return;
    const r=await api("/api/lists",{method:"POST",body:{name:newListName}});
    setNewListName("");setCreating(false);await onRefresh();setActiveList({id:r.id});
  };
  const deleteList=async(id)=>{
    if(!confirm("სია წაიშლება?"))return;
    await api(`/api/lists/${id}`,{method:"DELETE"});setActiveList(null);onRefresh();
  };
  const addItem=async()=>{
    if(!newItem.trim()||!currentList)return;
    await api(`/api/lists/${currentList.id}/items`,{method:"POST",body:{product_name:newItem}});
    setNewItem("");onRefresh();
  };
  const toggleItem=async(item,field)=>{
    await api(`/api/lists/${currentList.id}/items/${item.id}`,{method:"PATCH",body:{[field]:!item[field]}});
    onRefresh();
  };
  const deleteItem=async(item)=>{
    await api(`/api/lists/${currentList.id}/items/${item.id}`,{method:"DELETE"});onRefresh();
  };
  const unchecked=currentList?.items?.filter(i=>!i.checked)||[];
  const checked=currentList?.items?.filter(i=>i.checked)||[];
  return(
    <div className="fixed inset-0 z-50 flex lg:hidden">
      <div className="flex-1 bg-black/40" onClick={onClose}/>
      <div className="w-full max-w-sm bg-white h-full overflow-y-auto slide-in flex flex-col">
        <ListPanelContent lists={lists} activeList={activeList} setActiveList={setActiveList} creating={creating} setCreating={setCreating}
          newListName={newListName} setNewListName={setNewListName} createList={createList} currentList={currentList}
          unchecked={unchecked} checked={checked} newItem={newItem} setNewItem={setNewItem} addItem={addItem}
          toggleItem={toggleItem} deleteItem={deleteItem} deleteList={deleteList} onAnalyze={onAnalyze} onClose={onClose}/>
      </div>
    </div>
  );
}

function ListPanelContent({lists,activeList,setActiveList,creating,setCreating,newListName,setNewListName,createList,currentList,unchecked,checked,newItem,setNewItem,addItem,toggleItem,deleteItem,deleteList,onAnalyze,onClose}){
  return(
    <>
      <div className="bg-primary text-white p-4 flex items-center justify-between sticky top-0 z-10 shrink-0">
        <h2 className="font-bold text-base">📋 საყიდლების სიები</h2>
        {onClose&&<button onClick={onClose} className="text-white text-2xl leading-none hover:opacity-70 lg:hidden">×</button>}
      </div>
      <div className="p-3 border-b bg-gray-50 shrink-0">
        <div className="flex gap-2 flex-wrap">
          {lists.map(l=>(
            <button key={l.id} onClick={()=>setActiveList(l)}
              className={`px-3 py-1 rounded-full text-sm font-medium transition ${activeList?.id===l.id?'bg-primary text-white':'bg-white border border-gray-200 text-gray-600 hover:border-primary'}`}>
              {l.name}<span className="ml-1 text-xs opacity-60">({l.items?.length||0})</span>
            </button>
          ))}
          {creating
            ?<div className="flex gap-1">
              <input value={newListName} onChange={e=>setNewListName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createList()} autoFocus placeholder="სახელი"
                className="border rounded-full px-3 py-1 text-sm w-28 focus:ring-1 focus:ring-primary"/>
              <button onClick={createList} className="bg-primary text-white px-3 py-1 rounded-full text-sm">✓</button>
              <button onClick={()=>setCreating(false)} className="text-gray-400 px-2">✕</button>
             </div>
            :<button onClick={()=>setCreating(true)}
              className="px-3 py-1 rounded-full text-sm border border-dashed border-gray-300 text-gray-400 hover:border-primary hover:text-primary transition">
              + ახალი
             </button>
          }
        </div>
      </div>
      {currentList?(
        <div className="flex flex-col flex-1 min-h-0">
          <div className="p-3 flex gap-2 border-b shrink-0">
            <button onClick={()=>onAnalyze(currentList.items.filter(i=>!i.checked).map(i=>i.product_name))}
              disabled={unchecked.length===0}
              className="flex-1 bg-primary text-white text-xs font-semibold py-2 rounded-xl hover:bg-mid transition disabled:opacity-40">
              🤖 ფასების ანალიზი
            </button>
            <button onClick={()=>deleteList(currentList.id)} className="px-3 py-2 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition text-sm">🗑️</button>
          </div>
          <div className="p-3 border-b shrink-0">
            <div className="flex gap-2">
              <input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()}
                placeholder="პროდუქტი..."
                className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-primary"/>
              <button onClick={addItem} className="bg-primary text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-mid transition">+</button>
            </div>
          </div>
          <div className="flex-1 p-3 space-y-2 overflow-y-auto">

// Main App
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const [query,setQuery]=useState("");
  const [loading,setLoading]=useState(false);
  const [results,setResults]=useState([]);
  const [summary,setSummary]=useState("");
  const [source,setSource]=useState("");
  const [error,setError]=useState("");
  const [sortBy,setSortBy]=useState("price");
  const [onlyDisc,setOnlyDisc]=useState(false);

  const [mode,setMode]=useState("search");
  const [basketInput,setBasketInput]=useState("");
  const [basketItems,setBasketItems]=useState([]);
  const [basketLoading,setBasketLoading]=useState(false);
  const [basketResult,setBasketResult]=useState(null);
  const [basketError,setBasketError]=useState("");

  const [showLists,setShowLists]=useState(false);
  const [showAlerts,setShowAlerts]=useState(false);
  const [lists,setLists]=useState([]);
  const [alerts,setAlerts]=useState([]);
  const [addToListProduct,setAddToListProduct]=useState(null);
  const [toastAlerts,setToastAlerts]=useState([]);

  const [history,setHistory]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("searchHistory")||"[]")}catch{return[]}
  });
  const [trending,setTrending]=useState([]);

  const refreshLists=useCallback(()=>api("/api/lists").then(d=>setLists(d.lists||[])).catch(()=>{}),[]);
  const refreshAlerts=useCallback(()=>api("/api/alerts").then(d=>setAlerts(d.alerts||[])).catch(()=>{}),[]);

  useEffect(()=>{
    requestNotifications();
    refreshLists();refreshAlerts();
    api("/api/trending").then(d=>setTrending(d.trending||[])).catch(()=>{});
  },[]);

  useEffect(()=>{
    const poll=()=>{
      api("/api/alerts/check").then(d=>{
        const t=d.triggered||[];
        if(t.length){
          setToastAlerts(t);
          t.forEach(a=>sendNotification(`🔔 ${a.product_name}`,`${a.store} — ${fmt(a.current_price)}`,a.product_url));
        }
      }).catch(()=>{});
    };
    poll();
    const id=setInterval(poll,5*60*1000);
    return()=>clearInterval(id);
  },[]);

  const saveHistory=(q)=>{
    const updated=[q,...history.filter(h=>h!==q)].slice(0,20);
    setHistory(updated);
    localStorage.setItem("searchHistory",JSON.stringify(updated));
  };

  const doSearch=useCallback(async(q)=>{
    const sq=(q||query).trim();
    if(!sq)return;
    setQuery(sq);setLoading(true);setError("");setResults([]);setSummary("");setSource("");
    saveHistory(sq);
    try{
      const data=await api("/api/search",{method:"POST",body:{query:sq}});
      setResults(data.results||[]);setSummary(data.summary||"");setSource(data.source||"live");
      if(data.alerts?.length){
        setToastAlerts(data.alerts);
        data.alerts.forEach(a=>sendNotification(`🔔 ${a.product_name}`,`${a.store} — ${fmt(a.current_price)}`,a.product_url));
      }
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[query,history]);

  const addBasketItem=()=>{
    const t=basketInput.trim();
    if(!t||basketItems.includes(t))return;
    setBasketItems([...basketItems,t]);setBasketInput("");
  };
  const removeBasketItem=(item)=>setBasketItems(basketItems.filter(i=>i!==item));
  const analyzeBasket=async(itemsOverride)=>{
    const items=itemsOverride||basketItems;
    if(!items.length)return;
    setMode("basket");setBasketLoading(true);setBasketError("");setBasketResult(null);
    try{const data=await api("/api/basket",{method:"POST",body:{items}});setBasketResult(data);}
    catch(e){setBasketError(e.message);}
    finally{setBasketLoading(false);}
  };
  const quickAlert=async(product)=>{
    await api("/api/alerts",{method:"POST",body:{product_name:product.product_name}});
    refreshAlerts();alert(`✅ შეტყობინება: ${product.product_name}`);
  };

  const displayed=[...results]
    .filter(r=>!onlyDisc||r.discount_percent>0)
    .sort((a,b)=>{
      if(sortBy==="price")    return(a.current_price||999)-(b.current_price||999);
      if(sortBy==="discount") return(b.discount_percent||0)-(a.discount_percent||0);
      if(sortBy==="store")    return a.store_name.localeCompare(b.store_name);
      return 0;
    });

  return(
    <div className="min-h-screen bg-slate-50 flex flex-col">

      {/* ── HEADER ────────────────────────────────────────────────────────── */}
      <header className="bg-primary text-white shadow-lg sticky top-0 z-40 h-16">
        <div className="h-full flex items-center justify-between px-4 lg:px-6 max-w-none">

          {/* Logo */}
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 bg-white/20 rounded-xl flex items-center justify-center text-lg">🛒</div>
            <div>
              <h1 className="font-bold text-base leading-tight">ფასების შემდარებელი</h1>
              <p className="text-green-300 text-xs hidden sm:block">AI • სუპერმარკეტები • აფთიაქები</p>
            </div>
          </div>

          {/* Desktop search bar in header */}
          <div className="hidden lg:flex flex-1 max-w-xl mx-8 gap-2">
            <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()}
              placeholder="მოძებნე პროდუქტი..."
              className="flex-1 bg-white/15 border border-white/25 rounded-xl px-4 py-2 text-sm text-white placeholder-green-200 focus:bg-white/25 focus:border-white/50 transition"/>
            <button onClick={()=>doSearch()} disabled={loading}
              className="bg-white text-primary px-4 py-2 rounded-xl text-sm font-bold hover:bg-green-50 transition disabled:opacity-60 whitespace-nowrap">
              {loading?"⏳ ვეძებ":"🔍 ძიება"}
            </button>
          </div>

          {/* Nav buttons */}
          <div className="flex items-center gap-2">
            {/* Mode toggle (desktop) */}
            <div className="hidden lg:flex bg-white/10 rounded-xl p-0.5 gap-0.5">
              <button onClick={()=>setMode("search")}
                className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition ${mode==="search"?'bg-white text-primary shadow':'text-white/80 hover:text-white'}`}>
                🔍 ძიება
              </button>
              <button onClick={()=>setMode("basket")}
                className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition ${mode==="basket"?'bg-white text-primary shadow':'text-white/80 hover:text-white'}`}>
                🛒 კალათა {basketItems.length>0&&<span className="ml-1 bg-accent text-white text-xs px-1 rounded-full">{basketItems.length}</span>}
              </button>
            </div>

            {/* Mobile: alerts + lists buttons */}
            <button onClick={()=>{setShowAlerts(true);refreshAlerts();}}
              className="relative lg:hidden bg-white/10 hover:bg-white/20 text-white p-2 rounded-xl transition">
              🔔
              {alerts.filter(a=>a.active).length>0&&<span className="absolute -top-1 -right-1 bg-accent text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">{alerts.filter(a=>a.active).length}</span>}
            </button>
            <button onClick={()=>{setShowLists(true);refreshLists();}}
              className="lg:hidden bg-white/10 hover:bg-white/20 text-white px-3 py-2 rounded-xl text-sm transition">
              📋
            </button>
          </div>
        </div>
      </header>

      {/* ── BODY: main + desktop sidebar ─────────────────────────────────── */}
      <div className="flex flex-1 overflow-hidden">

        {/* ── MAIN CONTENT ──────────────────────────────────────────────── */}
        <main className="flex-1 overflow-y-auto">
          <div className="max-w-5xl mx-auto px-4 py-5 lg:py-6">

            {/* Mobile mode tabs */}
            <div className="lg:hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-1 flex gap-1 mb-4">
              <button onClick={()=>setMode("search")}
                className={`flex-1 py-2 rounded-xl text-sm font-semibold transition ${mode==="search"?'bg-primary text-white shadow':'text-gray-500 hover:text-gray-700'}`}>
                🔍 ძიება
              </button>
              <button onClick={()=>setMode("basket")}
                className={`flex-1 py-2 rounded-xl text-sm font-semibold transition ${mode==="basket"?'bg-primary text-white shadow':'text-gray-500 hover:text-gray-700'}`}>
                🛒 კალათა {basketItems.length>0&&<span className="ml-1 bg-accent text-white text-xs px-1.5 rounded-full">{basketItems.length}</span>}
              </button>
            </div>

            {/* ═══ SEARCH MODE ═══ */}
            {mode==="search"&&(
              <>
                {/* Mobile search box */}
                <div className="lg:hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
                  <div className="flex gap-2">
                    <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()}
                      placeholder="მაგ: ჰაგისი, ამოქსიცილინი..."
                      className="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-base focus:ring-2 focus:ring-primary transition" autoFocus/>
                    <button onClick={()=>doSearch()} disabled={loading}
                      className="bg-primary text-white px-5 py-3 rounded-xl font-semibold hover:bg-mid transition disabled:opacity-60">
                      {loading?"⏳":"🔍"}
                    </button>
                  </div>
                  {!loading&&!results.length&&history.length>0&&(
                    <div className="mt-3">
                      <p className="text-xs text-gray-400 mb-1.5">ბოლო ძიებები:</p>
                      <div className="flex flex-wrap gap-1">
                        {history.slice(0,8).map(q=>(
                          <button key={q} onClick={()=>doSearch(q)} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2.5 py-1 rounded-full transition">{q}</button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                {/* Desktop: history pills below header */}
                {!loading&&!results.length&&history.length>0&&(
                  <div className="hidden lg:block mb-4">
                    <p className="text-xs text-gray-400 mb-2">ბოლო ძიებები:</p>
                    <div className="flex flex-wrap gap-1.5">
                      {history.slice(0,10).map(q=>(
                        <button key={q} onClick={()=>doSearch(q)} className="text-xs bg-white border border-gray-200 hover:border-primary text-gray-600 hover:text-primary px-3 py-1 rounded-full shadow-sm transition">{q}</button>
                      ))}
                    </div>
                  </div>
                )}

                {/* Trending */}
                {!loading&&!results.length&&trending.length>0&&(
                  <div className="mb-4">
                    <p className="text-sm font-semibold text-gray-500 mb-2">🔥 პოპულარული დღეს</p>
                    <div className="flex flex-wrap gap-2">
                      {trending.map(t=>(
                        <button key={t.query} onClick={()=>doSearch(t.query)}
                          className="bg-white border border-gray-200 text-gray-700 text-sm px-3 py-1.5 rounded-full shadow-sm hover:border-primary hover:text-primary transition">
                          {t.query} <span className="text-xs text-gray-400">({t.count})</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {error&&<div className="mb-4 bg-red-50 border border-red-200 text-red-700 rounded-2xl p-4 text-sm">⚠️ {error}</div>}
                {loading&&<SearchProgress loading={true} isBasket={false}/>}

                {!loading&&results.length>0&&(
                  <div className="fade-up">
                    <div className="flex items-start gap-2 mb-4 flex-wrap">
                      {source==="local_db"&&<span className="inline-flex items-center gap-1 bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-full shrink-0">⚡ ბაზიდან</span>}
                      {source==="cache"   &&<span className="inline-flex items-center gap-1 bg-gray-100 text-gray-600 text-xs font-bold px-2.5 py-1 rounded-full shrink-0">💾 ქეში</span>}
                      {source==="live"    &&<span className="inline-flex items-center gap-1 bg-orange-100 text-orange-700 text-xs font-bold px-2.5 py-1 rounded-full shrink-0">🌐 პირდაპირი</span>}
                      {summary&&<p className="text-sm text-emerald-800 bg-emerald-50 border border-emerald-200 rounded-2xl px-4 py-2 flex-1">🤖 {summary}</p>}
                    </div>
                    <div className="flex flex-wrap gap-3 items-center justify-between mb-4">
                      <FilterBar sortBy={sortBy} setSortBy={setSortBy} onlyDisc={onlyDisc} setOnlyDisc={setOnlyDisc}/>
                      <p className="text-sm text-gray-500">ნაპოვნია <strong>{displayed.length}</strong> შედეგი</p>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                      {displayed.map((p,i)=>(
                        <ResultRow key={`${p.store_name}-${i}`} product={p} rank={i}
                          onAddToList={(prod)=>lists.length>0?setAddToListProduct(prod):alert("ჯერ შექმენი სია 📋")}
                          onSetAlert={quickAlert}/>
                      ))}
                    </div>
                  </div>
                )}

                {!loading&&!error&&!results.length&&(
                  <div className="text-center py-20 text-gray-400">
                    <div className="text-7xl mb-4 opacity-40">🛒</div>
                    <p className="text-xl font-semibold text-gray-600 mb-1">რა გსურთ მოძებნოთ?</p>
                    <p className="text-sm text-gray-400 mb-6">მოძებნე ნებისმიერი პროდუქტი — სუპერმარკეტიდან აფთიაქამდე</p>
                    <div className="flex flex-wrap justify-center gap-2">
                      {["ჰაგისი","ამოქსიცილინი","ძეხვი","კარაქი","შამპუნი","ნო-შპა"].map(s=>(
                        <button key={s} onClick={()=>doSearch(s)}
                          className="bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-full shadow-sm hover:border-primary hover:text-primary transition text-sm font-medium">{s}</button>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}

            {/* ═══ BASKET MODE ═══ */}
            {mode==="basket"&&(
              <div>
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-4">
                  <h2 className="font-bold text-gray-800 mb-1 flex items-center gap-2 text-lg">
                    <span>🛒</span> კალათის ანალიზი
                  </h2>
                  <p className="text-sm text-gray-500 mb-4">AI გეტყვის სად ყიდეს სულ იაფად — ერთ ან სხვადასხვა მაღაზიაში</p>
                  <div className="flex gap-2 mb-3">
                    <input value={basketInput} onChange={e=>setBasketInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addBasketItem()}
                      placeholder="მაგ: კოლა, კვერცხი, ზეთი..."
                      className="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary transition"/>
                    <button onClick={addBasketItem} className="bg-primary text-white px-4 py-2.5 rounded-xl text-sm font-semibold hover:bg-mid transition">+</button>
                  </div>
                  {basketItems.length>0&&(
                    <div className="flex flex-wrap gap-2 mb-4">
                      {basketItems.map(item=>(
                        <span key={item} className="flex items-center gap-1.5 bg-primary/10 text-primary border border-primary/20 px-3 py-1 rounded-full text-sm font-medium">
                          {item}
                          <button onClick={()=>removeBasketItem(item)} className="text-primary/60 hover:text-primary leading-none">×</button>
                        </span>
                      ))}
                    </div>
                  )}
                  {basketItems.length===0&&(
                    <div className="mb-3">
                      <p className="text-xs text-gray-400 mb-1.5">სწრაფი მაგალითი:</p>
                      <button onClick={()=>setBasketItems(["კოლა","კვერცხი","ზეთი"])}
                        className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-full transition">კოლა + კვერცხი + ზეთი</button>
                    </div>
                  )}
                  <div className="flex gap-2">
                    <button onClick={()=>analyzeBasket()} disabled={basketItems.length===0||basketLoading}
                      className="flex-1 bg-primary text-white py-2.5 rounded-xl font-semibold hover:bg-mid transition disabled:opacity-40 text-sm flex items-center justify-center gap-2">
                      {basketLoading?<><span className="animate-spin">⏳</span> ვანალიზებ...</>:<>🤖 ფასების ანალიზი</>}
                    </button>
                    {basketItems.length>0&&<button onClick={()=>setBasketItems([])}
                      className="px-4 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-500 hover:bg-gray-50 transition">გასუფთავება</button>}
                  </div>
                </div>
                {basketError&&<div className="bg-red-50 border border-red-200 text-red-700 rounded-2xl p-4 text-sm mb-4">⚠️ {basketError}</div>}
                <SearchProgress loading={basketLoading} isBasket={true}/>
                {!basketLoading&&<BasketView result={basketResult}/>}
                {!basketLoading&&!basketResult&&basketItems.length===0&&(
                  <div className="text-center py-16 text-gray-400">
                    <div className="text-6xl mb-3 opacity-30">🛍️</div>
                    <p className="text-lg font-semibold text-gray-600">კალათა ცარიელია</p>
                    <p className="text-sm mt-1">დაამატე პროდუქტები ზემოთ</p>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Footer */}
          <footer className="text-center text-xs text-gray-400 py-4 border-t border-gray-100 mt-4">
            Georgian Price Finder • ფასები განახლდება ავტომატურად
          </footer>
        </main>

        {/* ── DESKTOP SIDEBAR ───────────────────────────────────────────── */}
        <DesktopSidebar
          lists={lists} alerts={alerts}
          onRefresh={refreshLists} onRefreshAlerts={refreshAlerts}
          onAnalyze={(items)=>{setMode("basket");setBasketItems(items);}}
        />
      </div>

      {/* Mobile overlay panels */}
      {showLists&&<ShoppingListPanel lists={lists} onClose={()=>setShowLists(false)} onRefresh={refreshLists}
        onAnalyze={(items)=>{setMode("basket");setBasketItems(items);setShowLists(false);}}/>}
      {showAlerts&&<AlertPanel alerts={alerts} onClose={()=>setShowAlerts(false)} onRefresh={refreshAlerts}/>}

      {addToListProduct&&<AddToListModal product={addToListProduct} lists={lists} onClose={()=>setAddToListProduct(null)} onRefresh={refreshLists}/>}
      {toastAlerts.length>0&&<AlertToast alerts={toastAlerts} onClose={()=>setToastAlerts([])}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
